<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayesha Rasheed — Creative Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15171c;
    --bg-soft:#1c1f26;
    --card:#20242c;
    --line:#2e333d;
    --text:#eef0f3;
    --muted:#9aa1ad;
    --accent:#ff6b3d;
    --accent-soft:#ffb199;
    --teal:#3ddbc4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Sora',sans-serif;
    font-weight:300;
    line-height:1.6;
    min-height:100vh;
  }
  h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-0.02em;}
  a{cursor:pointer;}

  /* ===== HEADER ===== */
  header{
    position:sticky;top:0;z-index:100;
    background:rgba(21,23,28,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .header-inner{
    max-width:1300px;margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 32px;
  }
  .brand{
    font-family:'Space Grotesk',sans-serif;
    font-size:22px;font-weight:700;
    letter-spacing:-0.01em;text-decoration:none;color:var(--text);
  }
  .brand span{color:var(--accent);}
  .breadcrumb{
    font-size:13px;color:var(--muted);display:flex;gap:8px;align-items:center;
  }
  .breadcrumb a{color:var(--muted);text-decoration:none;}
  .breadcrumb a:hover{color:var(--accent);}
  .breadcrumb .sep{color:var(--line);}
  .breadcrumb .current{color:var(--text);}

  /* ===== HERO (home) ===== */
  .hero{
    max-width:1300px;margin:0 auto;
    padding:90px 32px 60px;
    display:grid;grid-template-columns:1.3fr 1fr;gap:60px;
    align-items:center;
  }
  .hero .eyebrow{
    color:var(--accent);font-size:13px;letter-spacing:.18em;
    text-transform:uppercase;font-weight:600;margin-bottom:18px;
  }
  .hero h1{
    font-size:clamp(40px,6vw,72px);
    line-height:1.05;
    margin-bottom:22px;
  }
  .hero h1 .accent{color:var(--accent);}
  .hero p{
    color:var(--muted);font-size:17px;max-width:480px;margin-bottom:28px;
  }
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap;}
  .btn{
    padding:13px 26px;border-radius:6px;font-size:14px;font-weight:600;
    text-decoration:none;display:inline-block;transition:.2s;
    font-family:'Space Grotesk',sans-serif;border:none;cursor:pointer;
  }
  .btn-primary{background:var(--accent);color:#15171c;}
  .btn-primary:hover{background:var(--accent-soft);}
  .btn-outline{border:1px solid var(--line);color:var(--text);background:transparent;}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent);}

  .hero-visual{
    position:relative;height:380px;border-radius:12px;overflow:hidden;
    border:1px solid var(--line);
  }
  .hero-visual img{width:100%;height:100%;object-fit:cover;display:block;}
  .hero-visual::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg, rgba(255,107,61,.18), transparent 60%);
  }

  /* ===== HOME CATEGORY GRID ===== */
  .section-head{
    max-width:1300px;margin:0 auto;padding:60px 32px 10px;
  }
  .section-head h2{font-size:30px;margin-bottom:8px;}
  .section-head p{color:var(--muted);font-size:15px;max-width:600px;}

  .cat-grid{
    max-width:1300px;margin:0 auto;padding:30px 32px 90px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
  }
  .cat-card{
    background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;
    padding:32px 28px;text-decoration:none;color:var(--text);
    transition:.25s;display:flex;flex-direction:column;gap:14px;
    min-height:180px;
  }
  .cat-card:hover{border-color:var(--accent);transform:translateY(-4px);}
  .cat-card .icon{
    font-size:28px;color:var(--accent);
  }
  .cat-card h3{font-size:22px;}
  .cat-card p{color:var(--muted);font-size:14px;flex:1;}
  .cat-card .count{
    font-size:12px;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  }

  /* ===== CATEGORY PAGE (sub-category grid) ===== */
  .category-hero{
    max-width:1300px;margin:0 auto;padding:60px 32px 20px;
  }
  .category-hero .tag{
    color:var(--accent);font-size:13px;letter-spacing:.18em;
    text-transform:uppercase;font-weight:600;margin-bottom:10px;display:block;
  }
  .category-hero h1{font-size:clamp(34px,5vw,56px);margin-bottom:16px;}
  .category-hero p{color:var(--muted);max-width:600px;font-size:16px;}

  .subcat-grid{
    max-width:1300px;margin:0 auto;padding:30px 32px 90px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
  }
  .subcat-card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    overflow:hidden;text-decoration:none;color:var(--text);transition:.25s;
  }
  .subcat-card:hover{border-color:var(--accent);transform:translateY(-4px);}
  .subcat-card img{width:100%;height:170px;object-fit:cover;display:block;}
  .subcat-card .sc-body{padding:18px 20px;}
  .subcat-card h3{font-size:18px;margin-bottom:4px;}
  .subcat-card .sc-meta{font-size:13px;color:var(--muted);}

  /* ===== SUBCATEGORY GALLERY PAGE ===== */
  .gallery-hero{
    max-width:1300px;margin:0 auto;padding:50px 32px 10px;
  }
  .gallery-hero .tag{
    color:var(--teal);font-size:13px;letter-spacing:.18em;
    text-transform:uppercase;font-weight:600;margin-bottom:10px;display:block;
  }
  .gallery-hero h1{font-size:clamp(30px,4.5vw,48px);}
  .gallery-grid{
    max-width:1300px;margin:0 auto;padding:30px 32px 90px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:18px;
  }
  .gallery-item{
    background:var(--card);border:1px solid var(--line);border-radius:10px;
    overflow:hidden;transition:.25s;
  }
  .gallery-item:hover{transform:translateY(-4px);border-color:var(--accent);}
  .gallery-item img{width:100%;height:170px;object-fit:cover;display:block;border-bottom:1px solid var(--line);}
  .gallery-item .gi-body{padding:12px 14px;}
  .gallery-item .gi-title{font-size:14px;font-weight:600;font-family:'Space Grotesk',sans-serif;}
  .gallery-item .gi-meta{font-size:12px;color:var(--muted);margin-top:2px;}

  /* ===== CONTACT / FOOTER ===== */
  .contact{
    max-width:1300px;margin:0 auto;padding:90px 32px;
    border-top:1px solid var(--line);text-align:center;
  }
  .contact h2{font-size:38px;margin-bottom:14px;}
  .contact p{color:var(--muted);margin-bottom:28px;}
  footer{
    border-top:1px solid var(--line);padding:32px 32px;
    text-align:center;color:var(--muted);font-size:13px;
  }
  footer .brand-foot span{color:var(--accent);}
  .social-row{
    display:flex;justify-content:center;gap:14px;margin-bottom:18px;
  }
  .social-row a{
    width:42px;height:42px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--line);color:var(--muted);
    text-decoration:none;transition:.2s;
  }
  .social-row a:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-3px);}
  .social-row svg{width:20px;height:20px;}

  .stats{
    max-width:1300px;margin:0 auto;
    display:grid;grid-template-columns:repeat(4,1fr);
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  }
  .stat{padding:30px 32px;border-right:1px solid var(--line);}
  .stat:last-child{border-right:none;}
  .stat .num{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:var(--accent);}
  .stat .label{color:var(--muted);font-size:13px;margin-top:4px;}

  @media(max-width:900px){
    .hero{grid-template-columns:1fr;padding-top:50px;}
    .hero-visual{height:240px;order:-1;}
    .stats{grid-template-columns:repeat(2,1fr);}
    .stat{border-bottom:1px solid var(--line);}
  }

  .view{display:none;}
  .view.active{display:block;}
  .fade-in{animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);}}
</style>
</head>

function renderCategory(catId){
  const cat = DATA[catId];
  document.getElementById('breadcrumb').innerHTML = `
    <a href="#" onclick="goHome();return false;">Home</a>
    <span class="sep">/</span>
    <span class="current">${cat.title}</span>
  `;

  let cards = Object.entries(cat.subs).map(([subName, items]) => {
    const cover = items[0].img;
    return `<a href="#" class="subcat-card" onclick="goSub('${catId}','${encodeURIComponent(subName)}');return false;">
      <img src="${cover}" alt="${escapeHtml(subName)}" loading="lazy">
      <div class="sc-body">
        <h3>${subName}</h3>
        <div class="sc-meta">${items.length} projects</div>
      </div>
    </a>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="category-hero fade-in">
      <span class="tag">${cat.icon}  Category</span>
      <h1>${cat.title}</h1>
      <p>${cat.desc}</p>
    </div>
    <div class="subcat-grid">${cards}</div>
    <section class="contact" id="contact">
      <h2>Let's Work Together</h2>
      <p>Available for freelance projects in ${cat.title.toLowerCase()} and more.</p>
      <a href="https://www.freelancer.com/u/ayeshajumppace" target="_blank" rel="noopener" class="btn btn-primary">Message on Freelancer</a>
      <a href="https://www.upwork.com/freelancers/ayeshar74" target="_blank" rel="noopener" class="btn btn-outline">Message on Upwork</a>
    </section>
  `;
  window.scrollTo(0,0);
}

function renderSub(catId, subNameEncoded){
  const cat = DATA[catId];
  const subName = decodeURIComponent(subNameEncoded);
  const items = cat.subs[subName];

  document.getElementById('breadcrumb').innerHTML = `
    <a href="#" onclick="goHome();return false;">Home</a>
    <span class="sep">/</span>
    <a href="#" onclick="goCategory('${catId}');return false;">${cat.title}</a>
    <span class="sep">/</span>
    <span class="current">${subName}</span>
  `;

  let gallery = items.map((item, i) => `
    <div class="gallery-item">
      <img src="${item.img}" alt="${escapeHtml(item.title)}" loading="lazy">
      <div class="gi-body">
        <div class="gi-title">${item.title}</div>
        <div class="gi-meta">Sample portfolio item</div>
      </div>
    </div>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="gallery-hero fade-in">
      <span class="tag">${cat.title}</span>
      <h1>${subName}</h1>
    </div>
    <div class="gallery-grid">${gallery}</div>
    <section class="contact" id="contact">
      <h2>Like what you see?</h2>
      <p>Let's discuss your ${subName.toLowerCase()} project.</p>
      <a href="https://www.freelancer.com/u/ayeshajumppace" target="_blank" rel="noopener" class="btn btn-primary">Message on Freelancer</a>
      <a href="https://www.upwork.com/freelancers/ayeshar74" target="_blank" rel="noopener" class="btn btn-outline">Message on Upwork</a>
    </section>
  `;
  window.scrollTo(0,0);
}

function goHome(){ renderHome(); }
function goCategory(catId){ renderCategory(catId); }
function goSub(catId, subNameEncoded){ renderSub(catId, subNameEncoded); }
function scrollToContact(){
  const c = document.getElementById('contact');
  if(c) c.scrollIntoView({behavior:'smooth'});
}

// init
renderHome();
</script>
